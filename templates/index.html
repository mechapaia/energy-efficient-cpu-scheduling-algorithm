<!DOCTYPE html>
<html>
<head>
<title>Scheduler</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

<h1>Energy Efficient CPU Scheduler</h1>

<div class="card">
<input id="arrival" placeholder="AT">
<input id="burst" placeholder="BT">
<button onclick="addProcess()">Add</button>
<button onclick="clearAll()" style="background:#ef4444;">Clear</button>

<table id="table">
<tr><th>PID</th><th>AT</th><th>BT</th></tr>
</table>
</div>

<div class="card">
<button onclick="run()">Run</button>

<table id="comparisonTable"></table>
<div id="ganttContainer"></div>
</div>

</div>

<script>
let processes = [];

// SAFE DOM REFERENCES
const table = document.getElementById("table");
const comparisonTable = document.getElementById("comparisonTable");
const ganttContainer = document.getElementById("ganttContainer");
const arrival = document.getElementById("arrival");
const burst = document.getElementById("burst");

function clearAll() {
    processes = [];

    table.innerHTML = "<tr><th>PID</th><th>AT</th><th>BT</th></tr>";
    comparisonTable.innerHTML = "";
    ganttContainer.innerHTML = "";

    arrival.value = "";
    burst.value = "";
}

function addProcess() {
    let at = parseInt(arrival.value);
    let bt = parseInt(burst.value);

    // VALIDATION
    if (isNaN(at) || isNaN(bt)) {
        alert("Please enter valid numbers");
        return;
    }

    let pid = processes.length + 1;
    processes.push({ pid, arrival: at, burst: bt });

    table.innerHTML += `<tr><td>${pid}</td><td>${at}</td><td>${bt}</td></tr>`;

    arrival.value = "";
    burst.value = "";
}

async function run() {

    if (processes.length === 0) {
        alert("Add processes first");
        return;
    }

    let res = await fetch("/schedule", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ processes })
    });

    let data = await res.json();

    comparisonTable.innerHTML = `
    <tr><th>Algo</th><th>Energy</th><th>TAT</th><th>WT</th></tr>`;

    ganttContainer.innerHTML = "";

    for (let algo in data) {
        let r = data[algo];

        comparisonTable.innerHTML += `
        <tr>
            <td>${algo.toUpperCase()}</td>
            <td>${r.energy.toFixed(2)}</td>
            <td>${r.tat.toFixed(2)}</td>
            <td>${r.wt.toFixed(2)}</td>
        </tr>`;

        drawGantt(algo, r.gantt);
    }
}

function drawGantt(name, gantt) {

    let wrapper = document.createElement("div");
    wrapper.className = "ganttWrapper";

    let title = document.createElement("div");
    title.className = "ganttTitle";
    title.innerText = name.toUpperCase();

    let chart = document.createElement("div");
    chart.className = "ganttChart";

    let timeline = document.createElement("div");
    timeline.className = "timeline";

    // FIX: ensure container width is valid
    let containerWidth = ganttContainer.clientWidth || 900;
    let totalTime = gantt[gantt.length - 1].end;

    let unit = containerWidth / totalTime;

    gantt.forEach(task => {
        let block = document.createElement("div");
        block.className = "ganttBlock";

        block.style.width = ((task.end - task.start) * unit) + "px";

        if (task.level) {
            if (task.level === "LOW") block.style.background = "#4caf50";
            else if (task.level === "MEDIUM") block.style.background = "#ff9800";
            else block.style.background = "#f44336";
        } else {
            block.style.background = "#2196f3";
        }

        block.innerText = "P" + task.pid;
        chart.appendChild(block);
    });

    // timeline
    for (let i = 0; i <= totalTime; i++) {
        let t = document.createElement("span");
        t.innerText = i;
        t.style.left = (i * unit) + "px";
        timeline.appendChild(t);
    }

    wrapper.appendChild(title);
    wrapper.appendChild(chart);
    wrapper.appendChild(timeline);

    ganttContainer.appendChild(wrapper);
}
</script>

</body>
</html>
