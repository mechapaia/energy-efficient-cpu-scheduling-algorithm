

<!DOCTYPE html>
<html>
<head>
<title>Scheduler</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e2e8f0;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 1200px;
    margin: auto;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.card {
    background: #1e293b;
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 25px;
}

input {
    width: 80px;
    padding: 8px;
    border-radius: 6px;
    border: none;
    margin-right: 8px;
    background: #334155;
    color: white;
}

button {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

table {
    width: 100%;
    margin-top: 15px;
    border-collapse: collapse;
}

td, th {
    padding: 10px;
    text-align: center;
}

.ganttWrapper {
    margin-top: 25px;
    padding: 20px;
    background: #0f172a;
    border-radius: 12px;
}

.ganttChart {
    display: flex;
    height: 55px;
    background: #1e293b;
    border-radius: 8px;
}

.ganttBlock {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    border-right: 1px solid #0f172a;
}

.timeline {
    position: relative;
    height: 22px;
    margin-top: 6px;
}

.timeline span {
    position: absolute;
    font-size: 11px;
}
</style>

</head>
<body>

<div class="container">

<h1>Energy Efficient CPU Scheduler</h1>

<div class="card">
<input id="arrival" placeholder="AT">
<input id="burst" placeholder="BT">
<button onclick="addProcess()">Add</button>
<button onclick="clearAll()">Clear</button>

<table id="table">
<tr><th>PID</th><th>AT</th><th>BT</th></tr>
</table>
</div>

<div class="card">
<button onclick="run()">Run</button>

<table id="comparisonTable"></table>
<div id="ganttContainer"></div>
</div>

</div>

<script>
let processes = [];

function clearAll() {
    processes = [];
    document.getElementById("table").innerHTML = "<tr><th>PID</th><th>AT</th><th>BT</th></tr>";
    document.getElementById("comparisonTable").innerHTML = "";
    document.getElementById("ganttContainer").innerHTML = "";
}

function addProcess() {
    let at = parseInt(document.getElementById("arrival").value);
    let bt = parseInt(document.getElementById("burst").value);

    if (isNaN(at) || isNaN(bt)) return alert("Enter valid numbers");

    let pid = processes.length + 1;
    processes.push({ pid, arrival: at, burst: bt });

    document.getElementById("table").innerHTML += 
    `<tr><td>${pid}</td><td>${at}</td><td>${bt}</td></tr>`;

    document.getElementById("arrival").value = "";
    document.getElementById("burst").value = "";
}

async function run() {

    let res = await fetch("/schedule", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ processes })
    });

    let data = await res.json();

    let comp = document.getElementById("comparisonTable");
    let ganttContainer = document.getElementById("ganttContainer");

    comp.innerHTML = "<tr><th>Algo</th><th>Energy</th><th>TAT</th><th>WT</th></tr>";
    ganttContainer.innerHTML = "";

    for (let algo in data) {
        let r = data[algo];

        comp.innerHTML += `
        <tr>
        <td>${algo}</td>
        <td>${r.energy.toFixed(2)}</td>
        <td>${r.tat.toFixed(2)}</td>
        <td>${r.wt.toFixed(2)}</td>
        </tr>`;

        drawGantt(algo, r.gantt);
    }
}

function drawGantt(name, gantt) {

    let wrapper = document.createElement("div");
    wrapper.className = "ganttWrapper";

    let chart = document.createElement("div");
    chart.className = "ganttChart";

    let timeline = document.createElement("div");
    timeline.className = "timeline";

    let total = gantt[gantt.length - 1].end;
    let unit = 800 / total;

    gantt.forEach(task => {
        let block = document.createElement("div");
        block.className = "ganttBlock";
        block.style.width = ((task.end - task.start) * unit) + "px";
        block.style.background = "#3b82f6";
        block.innerText = "P" + task.pid;
        chart.appendChild(block);
    });

    for (let i = 0; i <= total; i++) {
        let t = document.createElement("span");
        t.innerText = i;
        t.style.left = (i * unit) + "px";
        timeline.appendChild(t);
    }

    wrapper.appendChild(chart);
    wrapper.appendChild(timeline);

    document.getElementById("ganttContainer").appendChild(wrapper);
}
</script>

</body>
</html>
